name: Ruff

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        # Pin to the same version used in .pre-commit-config.yaml
        run: pip install ruff==0.15.6

      - name: Run Ruff linter
        run: ruff check . --no-cache

      - name: Run Ruff formatter check
        run: ruff format --check . --no-cache
