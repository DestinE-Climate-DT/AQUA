# Example FDB routing configuration for Destination Earth Climate-DT.
#
# Copy this file to `config.yaml` and adjust the `host` / `port` values to
# whichever catalogue endpoints are reachable from your site. The `select`
# expressions are regexes matched against MARS keys in the request.
#
# The fdb_xarray wrapper picks up the file via the `config_path` argument to
# `open_climate_dt(...)` (default `./config.yaml`).

type: select
fdbs:
  # Generation-2 Climate-DT (CLTE hourly + CLMN monthly, both resolutions)
  - select: class=d1,dataset=^climate-dt$,generation=2
    type: remote
    host: databridge-prod-catalogue4-ope.ewctest.link  # <-- replace N
    port: 10000
    engine: remote
    store: remote

  # Optional: a separate endpoint for CLMN at high resolution, if your site
  # splits routing per-stream. Uncomment and adjust.
  # - select: class=d1,stream=^clmn$,resolution=^high$,dataset=^climate-dt$,generation=2
  #   type: remote
  #   host: databridge-prod-catalogueX-ope.ewctest.link
  #   port: 10000
  #   engine: remote
  #   store: remote

  # Generation-1 Climate-DT (if needed)
  - select: class=d1,dataset=^climate-dt$,generation=1
    type: remote
    host: databridge-prod-catalogue4-ope.ewctest.link
    port: 10000
    engine: remote
    store: remote

  # Extremes-DT
  - select: class=d1,dataset=^on-demand-extremes-dt$|^extremes-dt$
    type: remote
    host: databridge-prod-catalogue4-ope.ewctest.link
    port: 10000
    engine: remote
    store: remote
