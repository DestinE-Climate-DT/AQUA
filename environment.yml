# Create the environment:
# mamba env create -f environment.yml
# or if you really want to use conda
# conda env create -f environment.yml

name: aqua
channels:
  - conda-forge
  - nodefaults
# please note that some of these dependencies are made explicit on purpose, but are not directly required by conda/mamba
dependencies:
  # binaries
  - python>=3.10,<3.13
  - cdo>=2.5.0 #for smmregrid compatibility
  - eccodes==2.41.0
  - cartopy>=0.24.1,<=0.25.0
  - cartopy_offlinedata # this is needed for MN5 HPC
  - netcdf4<=1.7.2
  - hdf5<=1.14.6
  - h5py>=3.12.1,<=3.16.0
  - imagemagick
  # python
  - boto3<=1.42.63
  - cfgrib<=0.9.15.1
  - dask<=2026.1.2
  - fastparquet<=2025.12.0
  - filelock<=3.25.0
  - gcsfs<=2026.2.0
  - intake==0.7.0
  - intake-xarray<=2.0.0
  - jinja2<=3.1.6
  - kerchunk<=0.2.9
  - matplotlib<=3.10.8
  - metpy<=1.7.1
  - numpy<=2.4.1
  - pandas>=3.0.0,<=3.0.2
  - pypdf<=6.7.5
  - pyyaml<=6.0.3
  - regionmask<=0.13.0
  - ruamel.yaml<=0.19.1
  - scipy<=1.17.0
  - seaborn<=0.13.2
  - smmregrid==0.1.5
  - typeguard<=4.5.1
  - xarray>=2025.12.0,<=2026.4.0
  - zarr>=3.0,<=3.1.5
  - icechunk<=2.0.3
  - pip
  - pip:
    # pip install -e of AQUA itself
    - -e .[all]
    # For devs who want pre-commit, comment line above and uncomment the line below
    # - -e .[precommit,all]
